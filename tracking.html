<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Tracking - BusMitra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Leaflet.js Real Map CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        /* Custom Bus Marker Pulse Animation */
        .bus-marker-icon {
            background-color: #dc2626;
            border: 3px solid #ffffff;
            border-radius: 50%;
            color: white;
            display: flex !important;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body class="h-screen w-full flex flex-col overflow-hidden bg-slate-100">
     
    <!-- Real OpenStreetMap Container -->
    <div class="flex-1 relative overflow-hidden">
        <div id="map"></div>
        
        <!-- Close Button -->
        <div class="absolute top-8 right-6 z-[1000]">
            <button onclick="window.location.href='home.html'" class="w-12 h-12 bg-white rounded-2xl shadow-xl flex items-center justify-center text-slate-700 font-bold border border-slate-100 active:scale-90 transition-all">
                <i class="fas fa-times text-lg"></i>
            </button>
        </div>

        <!-- Live Status Indicator Overlay -->
        <div class="absolute top-8 left-6 z-[1000] bg-white/90 backdrop-blur-md px-3.5 py-2 rounded-2xl shadow-lg border border-white flex items-center gap-2">
            <span class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-ping"></span>
            <span class="text-xs font-black text-slate-800 tracking-wide uppercase">Live GPS</span>
        </div>
    </div>

    <!-- Bottom Info Panel -->
    <div class="fixed bottom-0 left-0 right-0 bg-white rounded-t-[40px] shadow-[0_-10px_40px_rgba(0,0,0,0.15)] z-[1000]">
        <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mt-3"></div>
             
        <div class="p-6 pb-8 space-y-4">
            <!-- Estimated Time -->
            <div class="text-center bg-red-50 p-3 rounded-2xl border border-red-100">
                <p class="text-[10px] font-bold text-red-500 uppercase tracking-wide">अंदाजे वेळ / Estimated Status</p>
                <h2 id="liveStatusText" class="text-2xl font-black text-red-600 mt-0.5">लोकेशन ट्रॅक होत आहे...</h2>
            </div>

            <!-- Bus Details -->
            <div class="flex justify-between items-center border-b border-slate-100 pb-3">
                <div>
                    <h3 id="busTitle" class="text-base font-extrabold text-slate-800">एसटी एक्सप्रेस</h3>
                    <p id="busNumSub" class="text-xs font-bold text-slate-500 mt-0.5">गाडी क्रमांक: --</p>
                </div>
                <span id="busBadge" class="px-3 py-1 bg-slate-900 text-white font-bold rounded-xl text-xs">--</span>
            </div>

            <!-- Route Info -->
            <div class="flex items-center gap-4 bg-slate-50 p-4 rounded-2xl border border-slate-200">
                <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-blue-600 shadow-sm shrink-0">
                    <i class="fas fa-route text-lg"></i>
                </div>
                <div class="flex-1">
                    <p class="text-[10px] text-slate-400 font-bold uppercase">प्रवास मार्ग (Route)</p>
                    <p id="busRoute" class="text-slate-800 font-extrabold text-base leading-tight">--</p>
                </div>
                <div id="deptVal" class="text-sm font-black text-slate-700">--</div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ogdzoewuvnwnywqueijl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9nZHpvZXd1dm53bnl3cXVlaWpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1NDY3NjMsImV4cCI6MjEwMDEyMjc2M30.q11SVL1BWJ72k4M-ujp3wPqP6s369RQTnjjD8vcZNNU';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const params = new URLSearchParams(window.location.search);
        const busNumber = params.get('busNumber') || 'MH-20-BL-0494';

        // UI Element Updates
        document.getElementById('busTitle').innerText = params.get('type') || 'एसटी बस';
        document.getElementById('busNumSub').innerText = `गाडी क्रमांक: ${busNumber}`;
        document.getElementById('busBadge').innerText = params.get('type') || 'Express';
        document.getElementById('busRoute').innerText = `${params.get('from') || 'मुंबई'} ➔ ${params.get('to') || 'पुणे'}`;
        document.getElementById('deptVal').innerText = params.get('dept') || '08:00 AM';

        // 1. Initialize Leaflet Map (Default Maharashtra Center)
        let map = L.map('map', { zoomControl: false }).setView([19.7515, 75.7139], 7);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Custom Red Bus Icon
        const busIcon = L.divIcon({
            className: 'bus-marker-icon',
            html: '<i class="fas fa-bus text-base"></i>',
            iconSize: [40, 40],
            iconAnchor: [20, 20]
        });

        let marker = null;

        // 2. Real-time Location Sync with Supabase
        async function syncLiveLocation() {
            const { data, error } = await _supabase
                .from('buses')
                .select('lat, lng')
                .eq('bus_number', busNumber)
                .single();

            if (data && data.lat && data.lng) {
                const lat = data.lat;
                const lng = data.lng;

                if (!marker) {
                    marker = L.marker([lat, lng], { icon: busIcon }).addTo(map);
                    map.setView([lat, lng], 15); // Zoom into the bus location
                } else {
                    marker.setLatLng([lat, lng]);
                }

                document.getElementById('liveStatusText').innerText = "बस वेळेवर धावत आहे 🟢";
            } else {
                document.getElementById('liveStatusText').innerText = "ड्रायव्हर अजून ऑफलाइन आहे ⚪";
            }
        }

        // Fetch location every 3 seconds
        syncLiveLocation();
        setInterval(syncLiveLocation, 3000);
    </script>
</body>
</html>
