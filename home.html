<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Buses - BusMitra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#dc2626">
</head>
<body class="bg-slate-50 min-h-screen p-4 pb-12">

    <div class="max-w-md mx-auto space-y-6">

        <!-- Top Header & Admin Access -->
        <div class="flex items-center justify-between pt-2">
            <div class="flex items-center gap-2">
                <div class="w-9 h-9 bg-red-600 rounded-xl flex items-center justify-center text-white shadow-md">
                    <i class="fas fa-bus text-sm"></i>
                </div>
                <span class="font-black text-xl text-slate-800 tracking-wide">BusMitra</span>
            </div>
            <div class="flex items-center gap-2">
                <a href="driver.html" class="p-2.5 bg-white border border-slate-200 rounded-xl text-slate-600 text-xs font-bold shadow-sm active:scale-90 transition-all flex items-center gap-1">
                    <i class="fas fa-steering-wheel text-red-500"></i> Driver
                </a>
                <a href="admin.html" class="p-2.5 bg-slate-900 text-white rounded-xl text-xs font-bold shadow-sm active:scale-90 transition-all">
                    <i class="fas fa-lock"></i>
                </a>
            </div>
        </div>

        <!-- Search Form Card -->
        <div class="bg-white p-6 rounded-[32px] shadow-sm border border-slate-200/80 space-y-5">
            <h2 class="text-base font-extrabold text-slate-800 flex items-center gap-2">
                <i class="fas fa-route text-red-600"></i> बस शोधा (Search Bus)
            </h2>

            <div class="space-y-3 relative">
                <!-- From City -->
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-wider block mb-1">कुठून (Departure)</label>
                    <div class="relative">
                        <i class="fas fa-circle-dot text-emerald-500 absolute left-4 top-4 text-xs"></i>
                        <input type="text" id="fromInput" list="cityList" placeholder="उदा. पुणे / Pune" class="w-full pl-10 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl font-extrabold text-sm text-slate-800 focus:outline-none focus:border-red-500">
                    </div>
                </div>

                <!-- Swap Icon Indicator -->
                <div class="flex justify-center -my-2 relative z-10">
                    <button onclick="swapCities()" class="w-8 h-8 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-full border border-slate-200 flex items-center justify-center text-xs shadow-sm active:rotate-180 transition-all duration-300">
                        <i class="fas fa-arrow-down-up"></i>
                    </button>
                </div>

                <!-- To City -->
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-wider block mb-1">कुठे (Destination)</label>
                    <div class="relative">
                        <i class="fas fa-location-dot text-red-500 absolute left-4 top-4 text-xs"></i>
                        <input type="text" id="toInput" list="cityList" placeholder="उदा. मलकापूर / Malkapur" class="w-full pl-10 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl font-extrabold text-sm text-slate-800 focus:outline-none focus:border-red-500">
                    </div>
                </div>
            </div>

            <!-- 🏙️ AUTO-SUGGEST CITY LIST Datalist -->
            <datalist id="cityList">
                <option value="Pune">पुणे (Pune)</option>
                <option value="Malkapur">मलकापूर (Malkapur)</option>
                <option value="Mumbai">मुंबई (Mumbai)</option>
                <option value="Nagpur">नागपूर (Nagpur)</option>
                <option value="Nashik">नाशिक (Nashik)</option>
                <option value="Chhatrapati Sambhajinagar">छत्रपती संभाजीनगर (Chhatrapati Sambhajinagar)</option>
                <option value="Aurangabad">औरंगाबाद (Aurangabad)</option>
                <option value="Kolhapur">कोल्हापूर (Kolhapur)</option>
                <option value="Solapur">सोलापूर (Solapur)</option>
                <option value="Amravati">अमरावती (Amravati)</option>
                <option value="Buldhana">बुलढाणा (Buldhana)</option>
                <option value="Jalgaon">जळगाव (Jalgaon)</option>
                <option value="Akola">अकोला (Akola)</option>
                <option value="Thane">ठाणे (Thane)</option>
                <option value="Satara">सातारा (Satara)</option>
                <option value="Sangli">सांगली (Sangli)</option>
                <option value="Nanded">नांदेड (Nanded)</option>
                <option value="Latur">लातूर (Latur)</option>
                <option value="Dhule">धुळे (Dhule)</option>
                <option value="Ahmednagar">अहमदनगर (Ahmednagar)</option>
            </datalist>

            <!-- Search Button -->
            <button onclick="searchBuses()" class="w-full py-4 bg-red-600 hover:bg-red-700 text-white rounded-2xl font-black text-sm tracking-wide shadow-lg shadow-red-900/10 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                <i class="fas fa-magnifying-glass"></i>
                <span>बसेस शोधा</span>
            </button>
        </div>

        <!-- Popular Routes Shortcuts -->
        <div class="space-y-3">
            <h3 class="text-xs font-black text-slate-400 uppercase tracking-wider">प्रसिद्ध मार्ग (Popular Routes)</h3>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="quickRoute('Pune', 'Malkapur')" class="p-3 bg-white border border-slate-200/80 rounded-2xl text-left active:scale-95 transition-all shadow-sm">
                    <p class="text-xs font-black text-slate-800">Pune ➔ Malkapur</p>
                    <p class="text-[10px] text-slate-400 font-bold mt-0.5">पुणे ते मलकापूर</p>
                </button>
                <button onclick="quickRoute('Mumbai', 'Pune')" class="p-3 bg-white border border-slate-200/80 rounded-2xl text-left active:scale-95 transition-all shadow-sm">
                    <p class="text-xs font-black text-slate-800">Mumbai ➔ Pune</p>
                    <p class="text-[10px] text-slate-400 font-bold mt-0.5">मुंबई ते पुणे</p>
                </button>
            </div>
        </div>

    </div>

    <script>
        // Marathi to English Mapping Dictionary
        const cityMap = {
            'पुणे': 'Pune', 'पुणे (pune)': 'Pune',
            'मलकापूर': 'Malkapur', 'मलकापूर (malkapur)': 'Malkapur',
            'मुंबई': 'Mumbai', 'मुंबई (mumbai)': 'Mumbai',
            'नागपूर': 'Nagpur', 'नागपूर (nagpur)': 'Nagpur',
            'नाशिक': 'Nashik', 'नाशिक (nashik)': 'Nashik',
            'छत्रपती संभाजीनगर': 'Chhatrapati Sambhajinagar',
            'औरंगाबाद': 'Aurangabad',
            'कोल्हापूर': 'Kolhapur',
            'सोलापूर': 'Solapur',
            'अमरावती': 'Amravati',
            'बुलढाणा': 'Buldhana',
            'जळगाव': 'Jalgaon'
        };

        function convertToEnglish(city) {
            const trimmed = city.trim();
            const lowerKey = trimmed.toLowerCase();
            return cityMap[trimmed] || cityMap[lowerKey] || trimmed;
        }

        function searchBuses() {
            const rawFrom = document.getElementById('fromInput').value;
            const rawTo = document.getElementById('toInput').value;

            if (!rawFrom || !rawTo) {
                alert('कृपया दोन्ही शहरांची नावे टाका!');
                return;
            }

            const fromCity = convertToEnglish(rawFrom);
            const toCity = convertToEnglish(rawTo);

            window.location.href = `results.html?from=${encodeURIComponent(fromCity)}&to=${encodeURIComponent(toCity)}`;
        }

        function quickRoute(from, to) {
            window.location.href = `results.html?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`;
        }

        // Feature: Swap From and To Values
        function swapCities() {
            const fromInput = document.getElementById('fromInput');
            const toInput = document.getElementById('toInput');
            const temp = fromInput.value;
            fromInput.value = toInput.value;
            toInput.value = temp;
        }
    </script>
</body>
</html>
